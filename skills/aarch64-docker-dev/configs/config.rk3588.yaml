    board_paths:
      - /usr/lib/aarch64-linux-gnu/libdrm*.so*
      - /usr/include/libdrm
      - /usr/lib/aarch64-linux-gnu/pkgconfig/libdrm.pc

  - name: rga
    pkgconfig_names:
