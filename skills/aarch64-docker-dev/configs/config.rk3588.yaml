# Copy this file to your project, for example `aarch64-libs.yaml`, then edit it.

board:
  host: 192.168.2.119
  user: orange
  port: 22
  identity_file: ~/.ssh/id_rsa

docker:
  container: optimistic_mestorf
  prefix: /opt/cross_env/rk3588s/install
  libdir: /opt/cross_env/rk3588s/install/lib
  includedir: /opt/cross_env/rk3588s/install/include
  pkgconfig_dirs:
    - /opt/cross_env/rk3588s/install/lib/pkgconfig
    - /opt/cross_env/rk3588s/install/share/pkgconfig

libraries:
  - name: opencv4
    pkgconfig_names:
      - opencv4
    board_paths:
      - /usr/lib/aarch64-linux-gnu/libopencv*.so*
      - /usr/include/opencv4
      - /usr/lib/aarch64-linux-gnu/pkgconfig/opencv4.pc
      - /usr/lib/aarch64-linux-gnu/cmake/opencv4
    
  - name: opencv4-deps
    pkgconfig_names:
      - libjpeg
      - libwebp
      - libpng16
      - libtiff
      - libopenjp2
      - libgdcm
      - libgdal
      - libIlmImf-2_5
      - libIex-2_5
      - libIlmThread-2_5
      - libImath-2_5
      - libHalf-2_5
      - libtbb
      - libz
    board_paths:
      - /usr/lib/aarch64-linux-gnu/libjpeg.so*
      - /usr/lib/aarch64-linux-gnu/libwebp.so*
      - /usr/lib/aarch64-linux-gnu/libpng16.so*
      - /usr/lib/aarch64-linux-gnu/libtiff.so*
      - /usr/lib/aarch64-linux-gnu/libopenjp2.so*
      - /usr/lib/aarch64-linux-gnu/libgdcm*.so*
      - /lib/libgdal.so*
      - /usr/lib/aarch64-linux-gnu/libIlmImf-2_5.so*
      - /usr/lib/aarch64-linux-gnu/libIex-2_5.so*
      - /usr/lib/aarch64-linux-gnu/libIlmThread-2_5.so*
      - /usr/lib/aarch64-linux-gnu/libImath-2_5.so*
      - /usr/lib/aarch64-linux-gnu/libHalf-2_5.so*
      - /usr/lib/aarch64-linux-gnu/libtbb.so*
      - /usr/lib/aarch64-linux-gnu/libz.so*
    
  - name: opencv4-gdal-deps
    pkgconfig_names:
      - libcharls
      - libuuid
      - libjson-c
      - liblzma
      - libjbig
      - libdeflate
